name: prosody-ci

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/prosody-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/prosody-ci.yml"

jobs:
  sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: lint
        run: |
          python -m ruff check src scripts tests
      - name: package sanity
        run: |
          make package-sanity
      - name: unit tests
        run: |
          make test
