[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "zpe-prosody"
version = "0.1.0.dev0"
description = "Deterministic contour codec, retrieval, and transfer evaluation surfaces for ZPE Prosody."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "LicenseRef-Zer0pa-SAL-6.0"}
authors = [{name = "Zer0pa"}]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: Other/Proprietary License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Topic :: Multimedia :: Sound/Audio :: Analysis",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/Zer0pa/ZPE-Prosody"
Documentation = "https://github.com/Zer0pa/ZPE-Prosody/tree/main/docs"
Repository = "https://github.com/Zer0pa/ZPE-Prosody"
Changelog = "https://github.com/Zer0pa/ZPE-Prosody/blob/main/CHANGELOG.md"

[project.optional-dependencies]
api = [
  "fastapi>=0.109",
  "uvicorn>=0.27",
]
dev = [
  "build>=1.2",
  "ruff>=0.6",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["zpe_prosody*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
